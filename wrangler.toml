# Cloudflare Pages + D1 configuration
#
# Pages deployments inject the D1 binding via the dashboard (Settings →
# Functions → D1 bindings). This file is for local `wrangler pages dev`.
#
# Steps:
#   1) npx wrangler login
#   2) npx wrangler d1 create borealis-db
#      → copy the database_id into the binding below (only needed for remote)
#   3) npm run db:init:local
#   4) npm run db:seed:local
#   5) npm run dev     # http://localhost:8788

name = "borealis-reptiles"
pages_build_output_dir = "."
compatibility_date = "2024-09-01"

[[d1_databases]]
binding      = "DB"
database_name = "borealis-db"
database_id  = "53644655-2a5f-4ff8-9488-3e33cb1df1c8"

